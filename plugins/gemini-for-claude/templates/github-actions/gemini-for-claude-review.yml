name: Gemini for Claude Review

on:
  pull_request:
  workflow_dispatch:

# Security note:
# This workflow intentionally avoids the privileged target-style PR trigger.
# Fork pull requests skip Gemini, comments, and annotations by default so secrets
# are never exposed to untrusted fork code.

permissions:
  contents: read
  pull-requests: write
{{CHECKS_PERMISSION}}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: {{TIMEOUT_MINUTES}}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      BASE_REPO: ${{ github.repository }}
      IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
      GEMINI_MODEL: "{{MODEL}}"
      GEMINI_FOR_CLAUDE_RELEASE_REF: "{{RELEASE_REF}}"
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect fork safety
        id: fork-safety
        shell: bash
        run: |
          set -euo pipefail
          echo "Base SHA: $BASE_SHA"
          if [ "$IS_FORK" = "true" ] || [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "safe_to_review=false" >> "$GITHUB_OUTPUT"
            echo "Gemini review skipped for fork pull request." > gemini-for-claude-review.md
            printf '{"verdict":"skipped","summary":"Fork pull request skipped by default.","findings":[],"next_steps":[]}\n' > gemini-for-claude-review.json
          else
            echo "safe_to_review=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code and Gemini for Claude
        if: steps.fork-safety.outputs.safe_to_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          marketplace_dir="$RUNNER_TEMP/external-models-for-claude"
          rm -rf "$marketplace_dir"
          git init "$marketplace_dir"
          git -C "$marketplace_dir" remote add origin https://github.com/yilibinbin/external-models-for-claude
          git -C "$marketplace_dir" config core.sparseCheckout true
          {
            echo ".claude-plugin"
            echo "plugins/gemini-for-claude"
            echo "plugins/antigravity-for-claude"
          } > "$marketplace_dir/.git/info/sparse-checkout"
          git -C "$marketplace_dir" fetch --depth 1 origin "$GEMINI_FOR_CLAUDE_RELEASE_REF"
          git -C "$marketplace_dir" checkout --detach FETCH_HEAD
          claude plugin marketplace add "$marketplace_dir" --scope user
          claude plugin install gemini-for-claude@external-models-for-claude --scope user

      - name: Resolve Gemini for Claude plugin root
        if: steps.fork-safety.outputs.safe_to_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CLAUDE_PLUGIN_ROOT="$(
            claude plugin list --json | node -e '
              const fs = require("fs");
              const id = process.argv[1];
              const plugins = JSON.parse(fs.readFileSync(0, "utf8"));
              const plugin = plugins.find((item) => item.id === id);
              if (!plugin?.installPath) process.exit(1);
              process.stdout.write(plugin.installPath);
            ' "gemini-for-claude@external-models-for-claude"
          )"
          if [[ -z "$CLAUDE_PLUGIN_ROOT" || ! -f "$CLAUDE_PLUGIN_ROOT/scripts/gemini-companion.mjs" ]]; then
            echo "Gemini for Claude runtime was not found from Claude plugin metadata." >&2
            exit 1
          fi
          echo "CLAUDE_PLUGIN_ROOT=$CLAUDE_PLUGIN_ROOT" >> "$GITHUB_ENV"

      - name: Run Gemini review
        if: steps.fork-safety.outputs.safe_to_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node "$CLAUDE_PLUGIN_ROOT/scripts/gemini-companion.mjs" review --json --scope branch --base "$BASE_SHA" --context-provider {{CONTEXT_PROVIDER}}{{MODEL_ARG_SUFFIX}} > gemini-for-claude-review.json

      - name: Render review comment
        if: steps.fork-safety.outputs.safe_to_review == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node "$CLAUDE_PLUGIN_ROOT/scripts/gemini-companion.mjs" github-actions render-comment --input gemini-for-claude-review.json > gemini-for-claude-review.md

      - name: Publish PR comment
        if: steps.fork-safety.outputs.safe_to_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- gemini-for-claude-review -->';
            const body = `${marker}\n${fs.readFileSync('gemini-for-claude-review.md', 'utf8')}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            async function withBackoff(fn) {
              let lastError;
              for (const delay of [0, 1000, 3000]) {
                if (delay) await sleep(delay);
                try {
                  return await fn();
                } catch (error) {
                  lastError = error;
                  if (![403, 429].includes(error.status)) throw error;
                }
              }
              throw lastError;
            }
            await withBackoff(async () => {
              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
              const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body && comment.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
            });
{{ANNOTATION_STEP}}

      - name: Upload structured review artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-for-claude-review
          path: |
            gemini-for-claude-review.json
            gemini-for-claude-review.md
          retention-days: 5
